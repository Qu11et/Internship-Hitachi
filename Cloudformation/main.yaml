AWSTemplateFormatVersion: '2010-09-09'
Resources:
  VPCStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: https://nhom1awsbucket.s3.us-east-1.amazonaws.com/vpc.yaml

  InternetGatewayStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: https://nhom1awsbucket.s3.us-east-1.amazonaws.com/gateway.yaml
      Parameters:
        VPCId: !GetAtt VPCStack.Outputs.VPCId # Này là làm theo hướng nested stack (dùng GetAtt để lấy output của stack trước đó)
  # Nếu dùng cross stack thì sẽ dùng ImportValue để lấy output đã export của stack trước đó
  RouteTableStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: https://nhom1awsbucket.s3.us-east-1.amazonaws.com/route_table.yaml
      Parameters:
        VPCId: !GetAtt VPCStack.Outputs.VPCId
        InternetGatewayId: !GetAtt InternetGatewayStack.Outputs.InternetGatewayId

  PublicSubnetStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: https://nhom1awsbucket.s3.us-east-1.amazonaws.com/public_subnet.yaml
      Parameters:
        VPCId: !GetAtt VPCStack.Outputs.VPCId
        PublicRouteTableId: !GetAtt RouteTableStack.Outputs.PublicRouteTableId

  NATGatewayStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: https://nhom1awsbucket.s3.us-east-1.amazonaws.com/nat.yaml
      Parameters:
        PublicSubnet1Id: !GetAtt PublicSubnetStack.Outputs.PublicSubnet1Id
        PublicSubnet2Id: !GetAtt PublicSubnetStack.Outputs.PublicSubnet2Id

  PrivateSubnetStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: https://nhom1awsbucket.s3.us-east-1.amazonaws.com/private_subnet.yaml
      Parameters:
        VPCId: !GetAtt VPCStack.Outputs.VPCId     
        NATGateway1Id: !GetAtt NATGatewayStack.Outputs.NATGateway1Id
        NATGateway2Id: !GetAtt NATGatewayStack.Outputs.NATGateway2Id 

  SecurityGroupStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: https://nhom1awsbucket.s3.us-east-1.amazonaws.com/security_group.yaml
      Parameters:
        VPCId: !GetAtt VPCStack.Outputs.VPCId      

  ControlPlaneStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: https://nhom1awsbucket.s3.us-east-1.amazonaws.com/control_plane.yaml
      Parameters:
        ControlPlaneSecurityGroupId: !GetAtt SecurityGroupStack.Outputs.ControlPlaneSecurityGroupId
        PublicSubnet1Id: !GetAtt PublicSubnetStack.Outputs.PublicSubnet1Id
        PublicSubnet2Id: !GetAtt PublicSubnetStack.Outputs.PublicSubnet2Id
        PrivateSubnet1Id: !GetAtt PrivateSubnetStack.Outputs.PrivateSubnet1Id
        PrivateSubnet2Id: !GetAtt PrivateSubnetStack.Outputs.PrivateSubnet2Id

  NodeGroupStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: https://nhom1awsbucket.s3.us-east-1.amazonaws.com/node_group.yaml
      Parameters:
        VPCId: !GetAtt VPCStack.Outputs.VPCId

  ApplicationHelmChartStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: https://nhom1awsbucket.s3.us-east-1.amazonaws.com/application_helm_chart.yaml
      Parameters:
        VPCId: !GetAtt VPCStack.Outputs.VPCId




